<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acessar | Agente Idiomas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <script src="https://unpkg.com/lucide@latest"></script>

<body class="bg-gray-50 dark:bg-slate-900">
    <!-- Content -->
    <main class="w-full max-w-md mx-auto p-6 flex items-center min-h-screen">
        <div
            class="mt-7 bg-white border border-gray-200 rounded-xl shadow-sm dark:bg-slate-900 dark:border-gray-700 w-full">
            <div class="p-4 sm:p-7">
                <div class="text-center">
                    <h1 class="block text-2xl font-bold text-gray-800 dark:text-white" id="authTitle">Bem-vindo de volta
                    </h1>
                    <p class="mt-2 text-sm text-gray-600 dark:text-gray-400" id="authSubtitle">
                        <span id="toggleText">Ainda não tem conta?</span>
                        <a class="text-blue-600 decoration-2 hover:underline font-medium dark:focus:outline-none dark:focus:ring-1 dark:focus:ring-gray-600"
                            href="#" id="toggleBtn">
                            Cadastre-se aqui
                        </a>
                    </p>
                </div>

                <div class="mt-5">
                    <!-- Form -->
                    <form id="authForm">
                        <div class="grid gap-y-4">
                            <!-- Form Group -->
                            <div id="nameGroup" style="display: none;">
                                <label for="nameInput" class="block text-sm mb-2 dark:text-white">Nome Completo</label>
                                <div class="relative">
                                    <input type="text" id="nameInput" name="name"
                                        class="py-3 px-4 block w-full border-gray-200 rounded-lg text-sm focus:border-blue-500 focus:ring-blue-500 disabled:opacity-50 disabled:pointer-events-none dark:bg-slate-900 dark:border-gray-700 dark:text-gray-400 dark:focus:ring-gray-600"
                                        placeholder="Seu nome">
                                </div>
                            </div>
                            <!-- End Form Group -->

                            <!-- Form Group -->
                            <div>
                                <label for="email" class="block text-sm mb-2 dark:text-white">Endereço de E-mail</label>
                                <div class="relative">
                                    <input type="email" id="emailInput" name="email"
                                        class="py-3 px-4 block w-full border-gray-200 rounded-lg text-sm focus:border-blue-500 focus:ring-blue-500 disabled:opacity-50 disabled:pointer-events-none dark:bg-slate-900 dark:border-gray-700 dark:text-gray-400 dark:focus:ring-gray-600"
                                        required placeholder="exemplo@email.com">
                                </div>
                            </div>
                            <!-- End Form Group -->

                            <!-- Form Group -->
                            <div>
                                <div class="flex justify-between items-center">
                                    <label for="password" class="block text-sm mb-2 dark:text-white">Senha</label>
                                </div>
                                <div class="relative">
                                    <input type="password" id="passwordInput" name="password"
                                        class="py-3 px-4 block w-full border-gray-200 rounded-lg text-sm focus:border-blue-500 focus:ring-blue-500 disabled:opacity-50 disabled:pointer-events-none dark:bg-slate-900 dark:border-gray-700 dark:text-gray-400 dark:focus:ring-gray-600"
                                        required placeholder="••••••••">
                                </div>
                            </div>
                            <!-- End Form Group -->

                            <button type="submit"
                                class="w-full py-3 px-4 inline-flex justify-center items-center gap-x-2 text-sm font-semibold rounded-lg border border-transparent bg-blue-600 text-white hover:bg-blue-700 disabled:opacity-50 disabled:pointer-events-none dark:focus:outline-none dark:focus:ring-1 dark:focus:ring-gray-600"
                                id="submitBtn">Entrar</button>
                        </div>
                    </form>
                    <!-- End Form -->
                </div>
            </div>
        </div>
    </main>
    <!-- End Content -->

    <script type="module">
        import { apiCall } from './js/api.js';
        import { setSessionId, setUserProfile } from './js/state.js';

        const form = document.getElementById('authForm');
        const toggleBtn = document.getElementById('toggleBtn');
        const authTitle = document.getElementById('authTitle');
        const authSubtitle = document.getElementById('authSubtitle');
        const nameGroup = document.getElementById('nameGroup');
        const toggleText = document.getElementById('toggleText');
        const submitBtn = form.querySelector('button');

        let isLogin = true;

        toggleBtn.onclick = (e) => {
            e.preventDefault();
            isLogin = !isLogin;

            if (isLogin) {
                authTitle.innerText = 'Bem-vindo de volta';
                authSubtitle.innerText = 'Entre para continuar sua jornada.';
                nameGroup.style.display = 'none';
                toggleText.innerText = 'Ainda não tem uma conta?';
                toggleBtn.innerText = 'Cadastre-se';
                submitBtn.innerText = 'Entrar';
            } else {
                authTitle.innerText = 'Crie sua conta';
                authSubtitle.innerText = 'Comece a falar um novo idioma hoje.';
                nameGroup.style.display = 'block';
                toggleText.innerText = 'Já tem uma conta?';
                toggleBtn.innerText = 'Entrar';
                submitBtn.innerText = 'Criar Conta';
            }
        };

        form.onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            const name = document.getElementById('nameInput').value;

            submitBtn.disabled = true;
            submitBtn.innerText = isLogin ? 'Entrando...' : 'Criando Conta...';

            try {
                // Front-end Validation (Requirement 2 & 3)
                const passwordBytes = new TextEncoder().encode(password).length;

                if (password.length < 8) {
                    alert('A senha deve ter pelo menos 8 caracteres.');
                    return;
                }

                if (passwordBytes > 256) {
                    alert('Sua senha é excessivamente longa. Por favor, use no máximo 256 caracteres.');
                    return;
                }

                const endpoint = isLogin ? '/v1/auth/login' : '/v1/auth/register';
                const body = isLogin ? { email, password } : { email, password, full_name: name };

                const data = await apiCall(endpoint, 'POST', body);

                if (isLogin) {
                    if (data.access_token) {
                        localStorage.setItem('access_token', data.access_token);
                        localStorage.setItem('user_email', email);
                        setSessionId(email);
                        alert('Login realizado com sucesso!');
                        window.location.href = 'dashboard.html';
                    }
                } else {
                    alert('Conta criada com sucesso! Agora você pode entrar.');
                    isLogin = true;
                    toggleBtn.click();
                }
            } catch (err) {
                alert('Erro: ' + err.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = isLogin ? 'Entrar' : 'Criar Conta';
            }
        };
    </script>
</body>

</html>
